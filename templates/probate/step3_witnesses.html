{% extends "probate/layout.html" %}

{% block step_content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h2 class="text-lg font-bold text-gray-800 mb-1">Step 3: Will Witnesses</h2>
    <p class="text-sm text-gray-500 mb-6">Enter the details of the two people who witnessed the will being signed. These are needed for the witness affidavits.</p>

    <form method="POST" action="/probate/{{ probate_id }}/step/3">
        <!-- Witness 1 -->
        <div class="mb-6 p-4 bg-gray-50 rounded-lg">
            <h3 class="text-sm font-semibold text-gray-700 mb-3">Witness 1</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name <span class="text-red-500">*</span></label>
                    <input type="text" name="witness1_name" value="{{ probate.witness1_name or '' }}" required
                           placeholder="As per IC"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">NRIC <span class="text-red-500">*</span></label>
                    <input type="text" name="witness1_nric" value="{{ probate.witness1_nric or '' }}" required
                           placeholder="YYMMDD-SS-NNNN"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address <span class="text-red-500">*</span></label>
                    <textarea name="witness1_address" rows="2" required
                              placeholder="Full residential address"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">{{ probate.witness1_address or '' }}</textarea>
                </div>
            </div>
        </div>

        <!-- Witness 2 -->
        <div class="mb-6 p-4 bg-gray-50 rounded-lg">
            <h3 class="text-sm font-semibold text-gray-700 mb-3">Witness 2</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name <span class="text-red-500">*</span></label>
                    <input type="text" name="witness2_name" value="{{ probate.witness2_name or '' }}" required
                           placeholder="As per IC"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">NRIC <span class="text-red-500">*</span></label>
                    <input type="text" name="witness2_nric" value="{{ probate.witness2_nric or '' }}" required
                           placeholder="YYMMDD-SS-NNNN"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address <span class="text-red-500">*</span></label>
                    <textarea name="witness2_address" rows="2" required
                              placeholder="Full residential address"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">{{ probate.witness2_address or '' }}</textarea>
                </div>
            </div>
        </div>

        <div class="flex justify-between mt-6">
            <a href="/probate/{{ probate_id }}/step/2" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 font-medium">Back</a>
            <button type="submit" class="px-6 py-2 bg-primary-600 text-white text-sm font-semibold rounded-lg hover:bg-primary-700">
                Save & Next
            </button>
        </div>
    </form>
</div>
{% endblock %}
