{# Reusable file upload widget with drag-and-drop.
   Pass: upload_id, category, label, accept, multiple #}
<div class="upload-widget border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-primary-400 transition-colors"
     id="upload-{{ upload_id }}"
     ondragover="event.preventDefault(); this.classList.add('border-primary-500', 'bg-primary-50')"
     ondragleave="this.classList.remove('border-primary-500', 'bg-primary-50')"
     ondrop="handleDrop(event, '{{ upload_id }}', '{{ category }}')">
    <input type="file" id="file-{{ upload_id }}" class="hidden"
           accept="{{ accept or '.jpg,.jpeg,.png,.pdf,.docx' }}"
           {{ 'multiple' if multiple else '' }}
           onchange="handleFileSelect(this, '{{ upload_id }}', '{{ category }}')">
    <label for="file-{{ upload_id }}" class="cursor-pointer">
        <svg class="mx-auto h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
        <p class="mt-1 text-sm font-medium text-gray-600">{{ label or 'Drop files here or click to upload' }}</p>
        <p class="text-xs text-gray-400">JPG, PNG, PDF, DOCX (max 10MB)</p>
    </label>
    <div id="upload-status-{{ upload_id }}" class="mt-2 text-sm"></div>
    <div id="upload-results-{{ upload_id }}" class="mt-2 text-left"></div>
</div>
