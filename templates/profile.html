{% extends "base.html" %}

{% block title %}Profile — {{ tenant.brand }} WillCraft{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-6 sm:py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">My Profile</h1>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <!-- Avatar & Role -->
        <div class="flex items-center gap-4 mb-6">
            <div class="w-16 h-16 rounded-full flex items-center justify-center text-xl font-bold text-white
                {% if user.role == 'admin' %}bg-amber-500
                {% elif user.role == 'approver' %}bg-emerald-600
                {% else %}bg-blue-500{% endif %}">
                {{ user.name[:2]|upper }}
            </div>
            <div>
                <div class="text-lg font-bold text-gray-900">{{ user.name }}</div>
                <div class="text-sm text-gray-500">{{ user.email }}</div>
                <span class="inline-block mt-1 px-2 py-0.5 text-xs font-semibold rounded-full
                    {% if user.role == 'admin' %}bg-amber-100 text-amber-700
                    {% elif user.role == 'approver' %}bg-emerald-100 text-emerald-700
                    {% else %}bg-blue-100 text-blue-700{% endif %}">
                    {{ role_labels.get(user.role, user.role) }}
                </span>
            </div>
        </div>

        <form method="POST" action="/profile" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="name" value="{{ user.name }}" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" value="{{ user.email }}" disabled
                       class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500">
                <p class="text-xs text-gray-400 mt-1">Contact admin to change email</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contact Number</label>
                <input type="text" name="contact" value="{{ user.contact or '' }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                       placeholder="Phone number">
            </div>

            <div class="border-t border-gray-200 pt-4 mt-4">
                <h3 class="text-sm font-semibold text-gray-700 mb-3">Change Password</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                        <input type="password" name="password" minlength="6"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                               placeholder="Leave blank to keep current password">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                        <input type="password" name="password2"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                               placeholder="Repeat new password">
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full px-6 py-2.5 bg-primary-600 text-white font-semibold rounded-lg hover:bg-primary-700 transition-colors">
                    Save Profile
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
