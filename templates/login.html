<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — {{ tenant.brand }} {{ tenant.subtitle }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, {{ tenant.gradient_from }} 0%, {{ tenant.gradient_via }} 50%, {{ tenant.gradient_to }} 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background pattern — subtle legal doc lines */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
            animation: drift 20s linear infinite;
        }
        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(40px, 40px); }
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 { width: 300px; height: 300px; background: {{ tenant.accent }}; top: -100px; right: -50px; animation-delay: 0s; }
        .orb-2 { width: 250px; height: 250px; background: rgba(255,255,255,0.3); bottom: -80px; left: -50px; animation-delay: 3s; }
        .orb-3 { width: 200px; height: 200px; background: {{ tenant.accent }}; top: 50%; left: 30%; animation-delay: 5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        /* Top accent bar */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 3px;
            background: linear-gradient(90deg, transparent, {{ tenant.accent }}, transparent);
            border-radius: 0 0 4px 4px;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, {{ tenant.accent }}, {{ tenant.btn_bg }});
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .brand-name {
            font-size: 28px;
            font-weight: 800;
            color: {{ tenant.accent }};
            text-align: center;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .brand-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-top: 2px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .quick-users {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 24px 0 20px;
        }

        .quick-user {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-user:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: {{ tenant.accent }};
            transform: translateY(-2px);
        }
        .quick-user .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: white;
        }
        .avatar-admin { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .avatar-advisor { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .avatar-approver { background: linear-gradient(135deg, #10b981, #059669); }
        .quick-user .q-name { color: rgba(255,255,255,0.85); font-size: 11px; font-weight: 600; }
        .quick-user .q-role { color: rgba(255,255,255,0.4); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        .divider span {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        .form-group input:focus {
            border-color: {{ tenant.accent }};
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px {{ tenant.accent }}33;
        }

        .pass-wrapper {
            position: relative;
        }
        .pass-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 16px 0 20px;
        }
        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: {{ tenant.accent }};
        }
        .remember-row label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: {{ tenant.btn_bg }};
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .login-btn:hover {
            background: {{ tenant.btn_hover }};
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            color: #fca5a5;
            font-size: 13px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            margin-top: 20px;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            body { padding: 16px; }
            .login-card { padding: 28px 24px; border-radius: 20px; }
            .brand-name { font-size: 24px; }
            .quick-users { gap: 6px; }
            .quick-user { padding: 10px 6px; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-card">
        <!-- Brand -->
        <div class="brand-icon">
            <svg width="28" height="28" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
        </div>
        <div class="brand-name">{{ tenant.brand }}</div>
        <div class="brand-subtitle">{{ tenant.subtitle }}</div>

        {% if quick_users %}
        <!-- Quick Login -->
        <div class="quick-users">
            {% for u in quick_users %}
            <div class="quick-user" onclick="quickSelect('{{ u.email }}')">
                <div class="avatar avatar-{{ u.role }}">{{ u.name[:2]|upper }}</div>
                <span class="q-name">{{ u.name }}</span>
                <span class="q-role">{{ role_labels.get(u.role, u.role) }}</span>
            </div>
            {% endfor %}
        </div>

        <div class="divider"><span>or sign in</span></div>
        {% endif %}

        <!-- Error Message -->
        {% if error %}
        <div class="error-msg">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
            {{ error }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" name="email" placeholder="your@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="pass-wrapper">
                    <input type="password" id="loginPass" name="password" placeholder="Enter password" autocomplete="current-password" required>
                    <button type="button" class="pass-toggle" onclick="togglePass()">👁</button>
                </div>
            </div>
            <div class="remember-row">
                <input type="checkbox" id="loginRemember" name="remember" value="1">
                <label for="loginRemember">Remember me</label>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="footer-text">
            {{ tenant.brand }} {{ tenant.subtitle }} &copy; 2026
        </div>
    </div>

    <script>
    function quickSelect(email) {
        document.getElementById('loginEmail').value = email;
        document.getElementById('loginPass').focus();
    }
    function togglePass() {
        var p = document.getElementById('loginPass');
        p.type = p.type === 'password' ? 'text' : 'password';
    }
    // Auto-focus email on load
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('loginEmail').focus();
    });
    </script>
</body>
</html>
