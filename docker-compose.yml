version: "3.8"

services:
  web:
    build: .
    container_name: willcraft-web
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - willcraft-data:/app/data
    expose:
      - "8000"
    networks:
      - willcraft-net

  nginx:
    image: nginx:alpine
    container_name: willcraft-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - willcraft-net

volumes:
  willcraft-data:

networks:
  willcraft-net:
